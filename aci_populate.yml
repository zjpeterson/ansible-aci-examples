- name: ACI Full Stack Populator
  hosts: apic
  connection: local
  gather_facts: false
  vars:
    target_node: "101"
    target_port: "10"
    vlan_start: 100
    common_args: &common_args
      host: "{{ ansible_host }}"
      username: "{{ ansible_user }}"
      password: "{{ ansible_password }}"
      validate_certs: false

  tasks:
    # --- STEP 1: ROUTING STACK ---
    - name: Ensure Tenant, VRF, and BD exist
      cisco.aci.aci_tenant:
        <<: *common_args
        tenant: Demo_Tenant
        state: present

    - name: Create VRF
      cisco.aci.aci_vrf:
        <<: *common_args
        tenant: Demo_Tenant
        vrf: Demo_VRF
        state: present

    - name: Create Bridge Domain
      cisco.aci.aci_bd:
        <<: *common_args
        tenant: Demo_Tenant
        bd: Demo_BD
        vrf: Demo_VRF
        state: present

    - name: Create App Profile and EPGs
      cisco.aci.aci_ap:
        <<: *common_args
        tenant: Demo_Tenant
        app_profile: Demo_App
        state: present

    - name: Create EPGs (Linked to BD)
      cisco.aci.aci_epg:
        <<: *common_args
        tenant: Demo_Tenant
        app_profile: Demo_App
        epg: "App_Ref_{{ item }}"
        bd: Demo_BD
        state: present
      loop: [1, 2, 3, 4, 5]

    # --- STEP 2: PHYSICAL PLUMBING ---
    - name: Create VLAN Pool and Range
      cisco.aci.aci_vlan_pool:
        <<: *common_args
        pool: Demo_VLAN_Pool
        pool_allocation_mode: static
        state: present

    - name: Add VLAN Range
      cisco.aci.aci_vlan_pool_encap_block:
        <<: *common_args
        pool: Demo_VLAN_Pool
        pool_allocation_mode: static
        name: "Demo_VLAN_Range"
        block_start: 100
        block_end: 200
        state: present

    - name: Create Domain and Link to Pool
      cisco.aci.aci_domain:
        <<: *common_args
        domain: Demo_Phys_Dom
        domain_type: phys
        state: present

    - name: Bind Domain to Pool
      cisco.aci.aci_domain_to_vlan_pool:
        <<: *common_args
        domain: Demo_Phys_Dom
        domain_type: phys
        vlan_pool: Demo_VLAN_Pool
        pool_allocation_mode: static
        state: present

    - name: Create AAEP and Link to Domain
      cisco.aci.aci_aep:
        <<: *common_args
        aep: Demo_AAEP
        state: present

    - name: Bind AAEP to Domain
      cisco.aci.aci_aep_to_domain:
        <<: *common_args
        aep: Demo_AAEP
        domain: Demo_Phys_Dom
        domain_type: phys
        state: present

    - name: Create Port Policy Group
      cisco.aci.aci_interface_policy_leaf_policy_group:
        <<: *common_args
        policy_group: Demo_Port_Config
        aep: Demo_AAEP
        lag_type: leaf
        state: present

    # --- STEP 3: ACCESS POLICIES ---
    - name: Create Profiles and Selectors
      cisco.aci.aci_switch_policy_leaf_profile:
        <<: *common_args
        leaf_profile: "Leaf101_SwProf"
        state: present

    - name: Create Interface Profile
      cisco.aci.aci_interface_policy_leaf_profile:
        <<: *common_args
        interface_profile: "Leaf101_IntProf"
        state: present

    - name: Link Switch and Interface Profiles
      cisco.aci.aci_interface_selector_to_switch_policy_leaf_profile:
        <<: *common_args
        leaf_profile: "Leaf101_SwProf"
        interface_selector: "Leaf101_IntProf"
        state: present

    - name: Associate Hardware Node
      cisco.aci.aci_switch_leaf_selector:
        <<: *common_args
        leaf_profile: "Leaf101_SwProf"
        name: "Leaf101_Selector"
        leaf: "{{ target_node }}"
        state: present

    - name: Map Port to Group
      cisco.aci.aci_access_port_to_interface_policy_leaf_profile:
        <<: *common_args
        interface_profile: "Leaf101_IntProf"
        name: "Port_101_1_10_Selector"
        port_blk: "Block_Port_10"
        from_port: "{{ target_port }}"
        to_port: "{{ target_port }}"
        policy_group: Demo_Port_Config
        state: present

    # --- STEP 4: ACTIVATION ---
    - name: Associate EPGs with Domain (Force Immediate)
      cisco.aci.aci_epg_to_domain:
        <<: *common_args
        tenant: Demo_Tenant
        app_profile: Demo_App
        epg: "App_Ref_{{ item }}"
        domain: Demo_Phys_Dom
        domain_type: phys
        resolution_immediacy: immediate
        deploy_immediacy: immediate
        state: present
      loop: [1, 2, 3, 4, 5]

    - name: Create Static Paths (Force Immediate)
      cisco.aci.aci_static_binding_to_epg:
        <<: *common_args
        tenant: Demo_Tenant
        app_profile: Demo_App
        epg: "App_Ref_{{ item }}"
        encap_id: "{{ vlan_start + item }}"
        pod_id: 1
        leafs: "{{ target_node }}"
        interface: "1/{{ target_port }}"
        interface_mode: "trunk"
        deploy_immediacy: immediate
        state: present
      loop: [1, 2, 3, 4, 5]
