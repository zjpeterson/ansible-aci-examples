---
- name: Single access port
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    state: present
    tenant_name: demo_tenant
    ap_name: demo_ap
    epg_name: demo_epg_vlan15
    pg_name: demo_access_pg
    leaf_num: '101'
    leaf_int_num: '12'
    leaf_int_desc: "Demo Bare Metal Server A"
    pod_num: '1'

  tasks:
    - name: Provision interface selector
      cisco.aci.aci_access_port_to_interface_policy_leaf_profile:
        leaf_interface_profile: interface_profile_{{ leaf_num }}
        state: "{{ state }}"
        leaf_port_blk: block2
        access_port_selector: "eth-01-{{ leaf_int_num | int }}"
        from: "{{ leaf_int_num }}"
        to: "{{ leaf_int_num }}"
        leaf_port_blk_description: "{{ leaf_int_desc }}"
        policy_group: "{{ pg_name }}"
        interface_type: switch_port

    - name: Provision static binding to EPG
      cisco.aci.aci_static_binding_to_epg:
        state: "{{ state }}"
        interface_mode: 802.1p
        interface_type: switch_port
        deploy_immediacy: immediate
        tenant: "{{ tenant_name }}"
        ap: "{{ ap_name }}"
        epg: "{{ epg_name }}"
        pod: "{{ pod_num }}"
        interface: "1/{{ leaf_int_num | regex_replace('^0+') }}"
        leafs: "{{ leaf_num }}"
        vlan: "{{ epg_name | regex_search('\\d+') }}"
